<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DAC 2026 Papers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="papers">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html">DAC 2026 Papers</a>
        <nav class="nav-links" aria-label="Main navigation">
          <a aria-current="page" href="index.html">Papers</a>
          <a href="favorites.html">Favorites <span class="favorite-pill" data-favorite-count>0</span></a>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-intro">
        <p class="eyebrow">Research Manuscripts</p>
        <h1>Browse the DAC 2026 paper list</h1>
        <p class="intro-copy">Search by title, author, abstract, track, or session. Favorites are saved locally in your browser.</p>
      </section>

      <section class="toolbar" aria-label="Paper filters">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Timing analysis, GPU, security...">
        </label>
        <label>
          <span>Track</span>
          <select id="trackFilter">
            <option value="">All tracks</option>
          </select>
        </label>
        <label>
          <span>Sort</span>
          <select id="sortSelect">
            <option value="id">Paper ID</option>
            <option value="title">Title</option>
            <option value="authors">Authors</option>
          </select>
        </label>
      </section>

      <div class="result-summary" id="resultSummary">Loading papers...</div>
      <section class="paper-grid" id="paperList" aria-live="polite"></section>
    </main>

    <script src="assets/app.js" defer></script>
  </body>
</html>
