<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favorite DAC 2026 Papers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="favorites">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html">DAC 2026 Papers</a>
        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Papers</a>
          <a aria-current="page" href="favorites.html">Favorites <span class="favorite-pill" data-favorite-count>0</span></a>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-intro compact">
        <p class="eyebrow">Saved Papers</p>
        <h1>Your favorites</h1>
        <p class="intro-copy">This page only shows papers you have marked as favorites on this device.</p>
      </section>

      <section class="toolbar single" aria-label="Favorite paper filters">
        <label class="search-box">
          <span>Search favorites</span>
          <input id="searchInput" type="search" placeholder="Search saved papers...">
        </label>
      </section>

      <div class="result-summary" id="resultSummary">Loading favorites...</div>
      <section class="paper-grid" id="paperList" aria-live="polite"></section>
    </main>

    <script src="assets/app.js" defer></script>
  </body>
</html>
