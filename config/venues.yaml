# Venue registry. Each enabled entry names one venue, one adapter, and the
# minimum source locator that adapter cannot infer on its own.
#
# Adapter source keys:
#   linklings: base_url
#   dateconf:  program_url
#   sigarch:   program_url
#   researchr: program_url
#   dblp:      toc_url
#   openreview: venue_id (optional; inferred for ICLR/ICML/NeurIPS)
#   acl_anthology: event_url (optional; inferred for ACL)
#   aaai:      archive_url / issue_prefix (optional; inferred for AAAI)
#   ndss:      accepted_url (optional; inferred for NDSS)
#
# Paper tracks, event types, default labels, and metadata enrichers are inferred
# by the scraper pipeline. Do not encode derived page metadata here.

