# Venue registry — the list of conferences / journals to scrape and publish.
#
# Read by `confer.config` and driven by `confer build`. Each entry selects a
# scraper adapter (`scraper:`) and passes it adapter-specific options under `source:`.
#
# Fields:
#   id        unique slug; names the output web/public/data/<id>.json and cache dir
#   name      display name shown in the sidebar
#   series    venue family (e.g. all DAC years share series: DAC)
#   category  research area; the sidebar groups venues by this
#   kind      conference | journal  (the sidebar splits these)
#   year      integer (optional for journals)
#   scraper   which adapter handles it; must be registered in scrapers/__init__.py
#   enabled   skip when false
#   source    adapter-specific options

venues:
  - id: dac2026
    name: DAC 2026
    series: DAC
    category: EDA & Design Automation
    kind: conference
    year: 2026
    scraper: linklings
    enabled: true
    source:
      base_url: https://63dac.conference-program.com/
      prefixes: [RESEARCH]      # presentation-id prefixes to include
      all_presentations: false  # true = every presentation type, not just papers

  - id: date2026
    name: DATE 2026
    series: DATE
    category: EDA & Design Automation
    kind: conference
    year: 2026
    scraper: dateconf
    enabled: true
    source:
      program_url: https://www.date-conference.com/programme

  - id: asplos2026
    name: ASPLOS 2026
    series: ASPLOS
    category: Computer Architecture
    kind: conference
    year: 2026
    scraper: sigarch
    enabled: true
    source:
      program_url: https://www.asplos-conference.org/asplos2026/program/index.html
      default_track: Main Conference

  - id: hpca2026
    name: HPCA 2026
    series: HPCA
    category: Computer Architecture
    kind: conference
    year: 2026
    scraper: researchr
    enabled: true
    source:
      program_url: https://conf.researchr.org/track/hpca-2026/hpca-2026-main-conference
      context: hpca-2026
      default_event_type: Paper
      require_authors: true
      include_tracks:
        - Main Conference

  - id: isca2026
    name: ISCA 2026
    series: ISCA
    category: Computer Architecture
    kind: conference
    year: 2026
    scraper: sigarch
    enabled: true
    source:
      program_url: https://iscaconf.org/isca2026/program/
      default_track: Main Conference

  - id: micro2025
    name: MICRO 2025
    series: MICRO
    category: Computer Architecture
    kind: conference
    year: 2025
    scraper: sigarch
    enabled: true
    source:
      program_url: https://microarch.org/micro58/program/index.php
      default_track: Main Conference

  - id: icse2026
    name: ICSE 2026
    series: ICSE
    category: Software Engineering
    kind: conference
    year: 2026
    scraper: researchr
    enabled: true
    source:
      program_url: https://conf.researchr.org/program/icse-2026/program-icse-2026/
      context: icse-2026
      require_authors: true
      include_event_types:
        - Paper
        - Poster
        - Research paper
        - Talk
      include_tracks:
        - Demonstrations
        - Doctoral Symposium
        - Future of Software Engineering
        - Industry Challenge Track
        - Journal-first Papers
        - New Ideas and Emerging Results (NIER)
        - Posters
        - Research Track
        - SE In Practice (SEIP)
        - SE in Society (SEIS)
        - SRC - ACM Student Research Competition
        - Software Engineering Education and Training (SEET)

  - id: fse2026
    name: FSE 2026
    series: FSE
    category: Software Engineering
    kind: conference
    year: 2026
    scraper: researchr
    enabled: true
    source:
      program_url: https://conf.researchr.org/program/fse-2026/program-fse-2026/Detailed-Timeline
      context: fse-2026
      default_event_type: Paper
      require_authors: true
      include_tracks:
        - Doctoral Symposium
        - Ideas, Visions and Reflections
        - Industry Papers
        - Journal-First Paper
        - Posters
        - Research Papers
        - Software Engineering Education
        - Student Research Competition
        - Tool Demonstrations

  - id: ase2025
    name: ASE 2025
    series: ASE
    category: Software Engineering
    kind: conference
    year: 2025
    scraper: researchr
    enabled: true
    source:
      program_url: https://conf.researchr.org/program/ase-2025/program-ase-2025/
      context: ase-2025
      require_authors: true
      include_event_types:
        - Demonstration
        - Full-paper
        - Long-paper
        - Poster
        - Research paper
        - Short-paper
        - Talk
      include_tracks:
        - Doctoral Symposium
        - Industry Showcase
        - Journal-First
        - NIER
        - Posters
        - Research Papers
        - Student Research Competition
        - Tool Demonstration Track

  - id: issta2025
    name: ISSTA 2025
    series: ISSTA
    category: Software Testing & Analysis
    kind: conference
    year: 2025
    scraper: researchr
    enabled: true
    source:
      program_url: https://conf.researchr.org/program/issta-2025/program-issta-2025/Detailed-Timeline
      context: issta-2025
      default_event_type: Paper
      require_authors: true
      include_tracks:
        - Doctoral Symposium
        - Research Papers
        - Tool Demonstrations

  - id: oopsla2026
    name: OOPSLA 2026
    series: OOPSLA
    category: Programming Languages
    kind: conference
    year: 2026
    scraper: researchr
    enabled: true
    source:
      program_url: https://conf.researchr.org/track/splash-2026/oopsla-2026
      context: splash-2026
      default_event_type: Paper
      require_authors: true
      include_tracks:
        - OOPSLA

  # Example of a second venue on a different platform (disabled until the
  # openreview adapter exists — see "Planned" in AGENTS.md).
  - id: neurips2025
    name: NeurIPS 2025
    series: NeurIPS
    category: Machine Learning
    kind: conference
    year: 2025
    scraper: openreview
    enabled: false
    source:
      venue_id: NeurIPS.cc/2025/Conference
