# Venue registry — the list of conferences / journals to scrape and publish.
#
# Read by `confer.config` and driven by `confer build`. Each entry selects a
# scraper adapter (`scraper:`) and passes it adapter-specific options under `source:`.
#
# Fields:
#   id        unique slug; names the output web/public/data/<id>.json and cache dir
#   name      display name shown in the sidebar
#   series    venue family (e.g. all DAC years share series: DAC)
#   category  research area; the sidebar groups venues by this
#   kind      conference | journal  (the sidebar splits these)
#   year      integer (optional for journals)
#   scraper   which adapter handles it; must be registered in scrapers/__init__.py
#   enabled   skip when false
#   source    adapter-specific options
#             optional enrichers: crossref/openalex fetch publication metadata

venues:
  - id: dac2026
    name: DAC 2026
    series: DAC
    category: EDA & Design Automation
    kind: conference
    year: 2026
    scraper: linklings
    enabled: true
    source:
      base_url: https://63dac.conference-program.com/
      prefixes: [RESEARCH]      # presentation-id prefixes to include
      all_presentations: false  # true = every presentation type, not just papers
      enrichers:
        - crossref

  - id: date2026
    name: DATE 2026
    series: DATE
    category: EDA & Design Automation
    kind: conference
    year: 2026
    scraper: dateconf
    enabled: true
    source:
      program_url: https://www.date-conference.com/programme
      enrichers:
        - crossref

