# Netlify builds the Astro site in web/ and serves the static output.
# The scraper's JSON (web/public/data/*.json) is committed, so Netlify only
# runs the Astro build — it does not run the Python scraper.
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Stateless OAuth broker — exchanges a GitHub OAuth `code` for a gist-scoped
# token. Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET in the Netlify dashboard.
# The function stores nothing; the token goes back to the user's browser only.
[functions]
  directory = "web/netlify/functions"
